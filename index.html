<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal de Documentos | Carflex</title>
    <style>
        :root {
            --primary: #ff7225;
            --primary-dark: #e65a15;
            --text: #1f2937;
            --muted: #6b7280;
            --green: #4CAF50;
            --green-light: #e8f5e9;
            --border: #e5e7eb;
        }

        /* RESET */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background-color: #f3f4f6;
        }

        /* FONDO */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            background: url('fondo formulario.jpg') center/cover no-repeat;
            filter: brightness(.55) blur(4px);
            z-index: -1;
        }

        /* CARD */
        .card {
            background: rgba(255, 255, 255, .98);
            padding: 40px;
            border-radius: 20px;
            width: 100%;
            max-width: 460px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, .3);
            text-align: center;
            backdrop-filter: blur(10px);
            animation: fade .4s ease-out;
        }

        /* LOGO */
        .logo {
            width: 160px;
            margin-bottom: 20px;
        }

        /* TITULOS */
        h2 {
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text);
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--muted);
            margin-bottom: 25px;
            line-height: 1.5;
        }

        /* INPUTS */
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        /* Label principal (Patente, Correo) */
        .input-group > label {
            font-size: 11px;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            display: block;
            margin-bottom: 8px;
        }

        input[type=text], input[type=email] {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 2px solid var(--border);
            font-size: 15px;
            outline: none;
            transition: all .3s;
            background: #fff;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(255, 114, 37, 0.1);
        }

        /* SECCIÓN CHECKBOXES CORREGIDA */
        .checkbox-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .checkbox-item {
            display: flex;
            align-items: center; /* ALINEACIÓN VERTICAL PERFECTA */
            padding: 10px 12px;
            margin-bottom: 8px;
            border-radius: 10px;
            transition: background 0.2s;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .checkbox-item:hover {
            background: #f9fafb;
            border-color: var(--border);
        }

        /* Estilo del cuadradito (input) */
        .checkbox-item input[type=checkbox] {
            appearance: none;
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            border: 2px solid #d1d5db;
            border-radius: 6px;
            margin-right: 12px; /* Espacio entre cuadro y texto */
            cursor: pointer;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            background: #fff;
            flex-shrink: 0; /* Evita que el cuadro se achique */
        }

        .checkbox-item input[type=checkbox]:checked {
            background: var(--green);
            border-color: var(--green);
        }

        /* La marca de "Check" */
        .checkbox-item input[type=checkbox]:checked::after {
            content: "";
            width: 5px;
            height: 10px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
            position: absolute;
            margin-bottom: 2px;
        }

        /* Estilo del texto al lado del checkbox */
        .checkbox-item label {
            font-size: 14px;
            font-weight: 500;
            color: var(--text);
            text-transform: none; /* Quita las mayúsculas */
            letter-spacing: 0;
            margin-bottom: 0; /* Elimina el margen inferior heredado */
            cursor: pointer;
            user-select: none;
            display: inline-block;
        }

        /* BOTONES */
        button {
            width: 100%;
            padding: 16px;
            margin-top: 10px;
            border-radius: 12px;
            border: none;
            background: var(--primary);
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all .3s;
            box-shadow: 0 4px 6px rgba(255, 114, 37, 0.2);
        }

        button:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 6px 12px rgba(255, 114, 37, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: .6;
            cursor: not-allowed;
            transform: none;
        }

        /* MENSAJES */
        .msg {
            margin-top: 18px;
            font-size: 14px;
            min-height: 20px;
        }

        .loading { color: var(--muted); }

        .error {
            background: #fef2f2;
            color: #b91c1c;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #fee2e2;
        }

        /* EXITO */
        .success-screen {
            display: none;
            text-align: center;
        }

        .success-icon {
            font-size: 60px;
            margin-bottom: 20px;
            display: block;
        }

        .success-screen h3 {
            color: #065f46;
            margin-bottom: 12px;
            font-size: 20px;
        }

        .success-screen p {
            color: var(--muted);
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .btn-secondary {
            background: #374151;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .btn-secondary:hover {
            background: #111827;
        }

        /* ANIMACION */
        @keyframes fade {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* RESPONSIVE */
        @media(max-width:480px) {
            .card {
                padding: 30px 20px;
                max-width: 90%;
            }
        }
    </style>
</head>
<body>

<div class="card">
    <div id="form-screen">
        <img src="Logo carflex.jpg" class="logo" alt="Carflex">
        <h2>Portal de Documentos</h2>
        <p class="subtitle">
            Solicite su documento ingresando la patente, su correo electrónico y el tipo de documento requerido.
        </p>

        <form id="form">
            <div class="input-group">
                <label>Patente</label>
                <input id="patente" type="text" placeholder="Ej: AB123C" maxlength="6" required autocomplete="off">
            </div>

            <div class="input-group">
                <label>Correo Electrónico</label>
                <input id="correo" type="email" placeholder="ejemplo@correo.com" required>
            </div>

            <div class="input-group">
                <label>Tipo de Documento</label>
                <ul class="checkbox-list">
                    <li class="checkbox-item">
                        <input type="checkbox" id="tipoSOAP" name="tipo" value="SOAP">
                        <label for="tipoSOAP">SOAP</label>
                    </li>
                    <li class="checkbox-item">
                        <input type="checkbox" id="tipoPC" name="tipo" value="PC">
                        <label for="tipoPC">Permiso de Circulación</label>
                    </li>
                    <li class="checkbox-item">
                        <input type="checkbox" id="tipoMANT" name="tipo" value="MANTENCION">
                        <label for="tipoMANT">Certificado Última Mantención</label>
                    </li>
                </ul>
            </div>

            <button type="submit" id="btn-submit">Solicitar Certificado</button>
            <div id="msg" class="msg"></div>
        </form>
    </div>

    <div id="success-screen" class="success-screen">
        <span class="success-icon">✅</span>
        <h3>Solicitud enviada</h3>
        <p>El certificado fue enviado al correo:<br><strong id="correo-confirmado"></strong></p>
        <button class="btn-secondary" onclick="resetForm()">Solicitar otro certificado</button>
    </div>
</div>

<script>
    const WEBHOOK_URL = "https://uncollapsible-melodiously-chung.ngrok-free.dev/webhook/certificado";

    function normalizarPatente(v) {
        return v.toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 6);
    }

    function patenteValida(p) {
        return /^[A-Z]{4}[0-9]{2}$/.test(p) ||
               /^[A-Z]{2}[0-9]{4}$/.test(p) ||
               /^[A-Z]{2}[0-9]{2}[A-Z]{2}$/.test(p);
    }

    const inputPatente = document.getElementById("patente");
    inputPatente.addEventListener("input", e => { 
        e.target.value = normalizarPatente(e.target.value); 
    });

    document.getElementById("form").addEventListener("submit", async e => {
        e.preventDefault();

        const msg = document.getElementById("msg");
        const btn = document.getElementById("btn-submit");

        const patente = inputPatente.value;
        const correo = document.getElementById("correo").value;
        const tipos = Array.from(document.querySelectorAll('input[name="tipo"]:checked')).map(cb => cb.value);

        if (!patenteValida(patente)) {
            msg.className = "msg error";
            msg.innerHTML = "Formato de patente inválido.";
            return;
        }

        if (tipos.length === 0) {
            msg.className = "msg error";
            msg.innerHTML = "Debe seleccionar al menos un tipo de documento.";
            return;
        }

        msg.className = "msg loading";
        msg.innerHTML = "Procesando solicitud...";
        btn.disabled = true;

        try {
            const response = await fetch(WEBHOOK_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ patente, correo, tipos })
            });
            if (!response.ok) throw new Error();

            document.getElementById("correo-confirmado").textContent = correo;
            document.getElementById("form-screen").style.display = "none";
            document.getElementById("success-screen").style.display = "block";
        } catch (err) {
            msg.className = "msg error";
            msg.innerHTML = "Error de conexión. Intente nuevamente.";
        }

        btn.disabled = false;
    });

    function resetForm() {
        document.getElementById("form").reset();
        document.getElementById("success-screen").style.display = "none";
        document.getElementById("form-screen").style.display = "block";
        document.getElementById("msg").innerHTML = "";
        document.getElementById("msg").className = "msg";
    }
</script>

</body>
</html>
